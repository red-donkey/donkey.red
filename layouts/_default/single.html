{{ define "main" }}
{{ partial "site-header.html" . }}

<main>
  <section class="page-hero" aria-labelledby="page-title">
    <p class="eyebrow">{{ .Params.eyebrow }}</p>
    <h1 id="page-title" class="page-title">{{ .Title }}</h1>
  </section>

  <section class="content-card{{ if .Params.photo }} about-card{{ else }} prose{{ end }}">
    {{ with .Params.photo }}
      <img class="about-photo" src="{{ . }}" alt="Matt Wynne">
      <div class="prose">
        {{ $.Content }}
      </div>
    {{ else }}
      {{ .Content }}
    {{ end }}
  </section>
</main>
{{ end }}
