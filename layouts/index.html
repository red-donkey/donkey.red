{{ define "main" }}
<main class="site-card" aria-labelledby="site-title">
  <h1 id="site-title">{{ site.Title }}</h1>

  <dl class="business-details">
    <div>
      <dt>Business number</dt>
      <dd>{{ site.Params.businessNumber }}</dd>
    </div>
    <div>
      <dt>Contact</dt>
      <dd><a href="mailto:{{ site.Params.contactEmail }}">{{ site.Params.contactEmail }}</a></dd>
    </div>
  </dl>
</main>
{{ end }}
