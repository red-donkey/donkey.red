{{ define "main" }}
{{ partial "site-header.html" . }}

<main>
  <section class="hero" aria-labelledby="site-title">
    <div class="hero-copy">
      <h1 id="site-title">{{ range $index, $line := split .Params.tagline "\n" }}{{ if $index }}<br>{{ end }}{{ $line }}{{ end }}</h1>
      <p class="lede">{{ .Params.intro }}</p>
      <div class="actions">
        <a class="button" href="mailto:{{ site.Params.contactEmail }}">Start a conversation</a>
        <a class="button secondary" href="#what-we-do">What we do</a>
      </div>
    </div>
  </section>

  <section class="content-card prose">
    {{ .Content }}
  </section>
</main>
{{ end }}
